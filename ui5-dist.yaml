specVersion: "4.0"
metadata:
  name: com.openui5.webdb
type: application
resources:
  configuration:
    paths:
      webapp: public
framework:
  name: OpenUI5
  version: "1.146.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      configuration:
        baseUri: "http://localhost:3000"
        context: "/api"
