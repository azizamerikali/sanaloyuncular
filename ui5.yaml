specVersion: "4.0"
metadata:
  name: com.openui5.webdb
type: application
framework:
  name: OpenUI5
  version: "1.146.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.tnt
    - name: sap.ui.layout
    - name: sap.ui.unified
    - name: themelib_sap_horizon
builder:
  resources:
    excludes:
      - "test/e2e/**"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
    - name: ui5-middleware-livereload
      afterMiddleware: compression
    - name: ui5-middleware-proxy
      afterMiddleware: compression
      configuration:
        debug: true
        baseUrl: "http://localhost:3000"
        context: "/api"
